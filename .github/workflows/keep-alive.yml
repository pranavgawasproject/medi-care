name: Keep Supabase Alive

on:
  schedule:
    # Runs every 5 days at 03:00 UTC (safely under Supabase's 7-day inactivity pause)
    - cron: "0 3 */5 * *"
  workflow_dispatch: # manual trigger button

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Medi-Care Supabase project
        run: |
          curl -sS -o /dev/null -w "Medi-Care: HTTP %{http_code} (expect 200 or 401)\n" \
            "https://afrxbolcukhztlfhccud.supabase.co/rest/v1/" || true
